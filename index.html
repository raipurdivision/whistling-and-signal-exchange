        function submitForm() {
            const rows = document.querySelectorAll('#tableBody tr');
            const data = [];
            let isValid = true;

            // Get additional form fields
            const otherRemarks = document.getElementById('otherRemarks').value || '';
            const formDate = document.getElementById('formDate').value || '';
            const formTime = document.getElementById('formTime').value || '';
            const formPlace = document.getElementById('formPlace').value || '';
            const baMachineNo = document.getElementById('baMachineNo').value || '';
            const cliNameSelect = document.getElementById('cliName');
            const cliName = cliNameSelect.options[cliNameSelect.selectedIndex].value || '';

            // Validate required fields
            if (!formDate) {
                showMessage('Please select a date!', 'error');
                return;
            }

            if (!cliName) {
                showMessage('Please select CLI Name and HQ!', 'error');
                return;
            }

            rows.forEach((row, index) => {
                const cells = row.querySelectorAll('input, select, textarea');
                const rowData = {
                    sno: index + 1,
                    name: cells[0].value,
                    crewId: cells[1].value,
                    designation: cells[2].value,
                    callLogs: cells[3].value,
                    mobileStatus: cells[4].value,
                    callingTime: cells[5].value,
                    remarks: cells[6].value
                };

                data.push(rowData);
            });

            // Prepare payload for Google Apps Script
            const payload = {
                formDate: formDate,
                formTime: formTime,
                formPlace: formPlace,
                baMachineNo: baMachineNo,
                cliName: cliName,
                otherRemarks: otherRemarks,
                tableData: data
            };

            console.log('Submitting Data:', payload);
            showMessage('Submitting data to Google Sheets...', 'success');

            // Submit to Google Apps Script
            if (!APPS_SCRIPT_URL || APPS_SCRIPT_URL === "YOUR_APPS_SCRIPT_URL_HERE") {
                showMessage('⚠️ Please set your Apps Script URL in the APPS_SCRIPT_URL constant!', 'error');
                console.warn('APPS_SCRIPT_URL is not configured.');
                return;
            }

            fetch(APPS_SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(payload)
            })
            .then(() => {
                showMessage('Data submitted successfully to Google Sheets!', 'success');
                console.log('Submission successful!');
            })
            .catch((error) => {
                console.error('Error:', error);
                showMessage('Error submitting data. Please try again.', 'error');
            });
        }

        function generatePDF() {

            // ── Info fields just below heading (no borders, plain text) ──

            let infoY = 35;

            doc.setFont(undefined, 'bold');

            // Get table data
            const rows = document.querySelectorAll('#tableBody tr');
            const tableData = [];

            rows.forEach((row) => {
                const cells = row.querySelectorAll('input, select, textarea');

                tableData.push([

            // Generate table
            doc.autoTable({

                body: tableData,
                startY: 45,

                    3: { cellWidth: 20 },
                    4: { cellWidth: 20 },
                    5: { cellWidth: 18},
                    6: { cellWidth: 20 },
                    7: { cellWidth: 35 }
                },
                alternateRowStyles: {
                    fillColor: [240, 248, 255]
                }
            });

            // Get the Y position after the table
            let yPosition = doc.lastAutoTable.finalY + 10;

            doc.setLineWidth(0.5);
            doc.rect(14, yPosition + 2, boxWidth, boxHeight);

            // Add text inside the box
            if (otherRemarks) {
                doc.setFont(undefined, 'bold');
                const splitOtherRemarks = doc.splitTextToSize(otherRemarks, boxWidth - 4);
                doc.text(splitOtherRemarks, 18, yPosition + 7);
            }

            yPosition += boxHeight + 18;

            // Get CLI Name and Signature
            const cliNameSelect = document.getElementById('cliName');
            const cliName = cliNameSelect.options[cliNameSelect.selectedIndex].value || '';
            const signatureFile = document.getElementById('signature').files[0];

            // Add Signature if uploaded
            if (signatureFile) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const imgData = e.target.result;
                    const pageWidth = doc.internal.pageSize.getWidth();

                    // Add signature on the right side
                    doc.setFontSize(10);
                    doc.setFont(undefined, 'bold');
                    doc.text('Signature:', pageWidth - 54, yPosition);
                    doc.addImage(imgData, 'PNG', pageWidth - 54, yPosition + 2, 40, 15);

                    // Add Date and CLI Name after signature
                    addDateAndCLI();
                    saveDocument();

                reader.readAsDataURL(signatureFile);
            } else {
                // Add Date and CLI Name without signature
                addDateAndCLI();
                saveDocument();
            }

            function addDateAndCLI() {
                const pgWidth = doc.internal.pageSize.getWidth();

                // If signature was added, move down
                if (signatureFile) {
                    yPosition += 20;

                // CLI Name only (Date/Time/Place/BA Machine shown above table)

                    doc.setFont(undefined, 'bold');
                    doc.text(cliName, pgWidth - 14, yPosition, { align: 'right' });

            function saveDocument() {
                // Save PDF
                const timestamp = new Date().toISOString().split('T')[0];
                doc.save(`Mobile_Ambush_Checking_${timestamp}.pdf`);

        function showMessage(text, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = text;
            messageDiv.className = `message ${type}`;
            messageDiv.style.display = 'block';

            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 3000);
        }

        // Voice Typing Functionality
        let recognition;
        let isVoiceEnabled = false;
        let currentFocusedElement = null;

        // Check browser support for Speech Recognition
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'en-IN'; // English (India)

            recognition.onstart = function() {
                document.getElementById('listeningIndicator').style.display = 'inline';
            };

            recognition.onend = function() {
                document.getElementById('listeningIndicator').style.display = 'none';
                if (isVoiceEnabled) {
                    // Restart recognition if still enabled
                    setTimeout(() => {
                        if (isVoiceEnabled) {
                            try {
                                recognition.start();
                            } catch (e) {
                                console.log('Recognition restart error:', e);
                            }
                        }
                    }, 100);
                }
            };

            recognition.onerror = function(event) {
                console.error('Speech recognition error:', event.error);
                if (event.error === 'no-speech') {
                    // Ignore no-speech errors and continue
                    return;
                }
                if (event.error === 'aborted') {
                    return;
                }
                document.getElementById('listeningIndicator').style.display = 'none';
            };

            let lastProcessedIndex = 0;

            recognition.onresult = function(event) {
                if (!currentFocusedElement) return;

                let finalTranscript = '';

                // Only process new results to avoid duplication
                for (let i = lastProcessedIndex; i < event.results.length; i++) {
                    const transcript = event.results[i][0].transcript;
                    if (event.results[i].isFinal) {
                        finalTranscript += transcript + ' ';
                        lastProcessedIndex = i + 1;
                    }
                }

                if (finalTranscript) {
                    // Append final transcript to the current value in CAPITAL LETTERS
                    const currentValue = currentFocusedElement.value || '';
                    currentFocusedElement.value = currentValue + finalTranscript.toUpperCase();
                }
            };
        }

        function toggleVoiceTyping() {
            const toggle = document.getElementById('voiceToggle');
            const status = document.getElementById('voiceStatus');
            isVoiceEnabled = toggle.checked;

            if (isVoiceEnabled) {
                if (recognition) {
                    status.textContent = 'ON';
                    status.classList.add('voice-active');
                    showMessage('Voice typing enabled. Click on any text field and start speaking.', 'success');
                    setupVoiceListeners();
                } else {
                    toggle.checked = false;
                    isVoiceEnabled = false;
                    showMessage('Voice typing is not supported in your browser. Please use Chrome or Edge.', 'error');
                }
            } else {
                status.textContent = 'OFF';
                status.classList.remove('voice-active');
                document.getElementById('listeningIndicator').style.display = 'none';
                if (recognition) {
                    recognition.stop();
                }
                removeVoiceListeners();
                showMessage('Voice typing disabled.', 'success');
            }
        }

        function setupVoiceListeners() {
            // Add focus listeners to all text inputs and textareas
            const inputs = document.querySelectorAll('input[type="text"], textarea:not(.zoom-input)');
            inputs.forEach(input => {
                input.addEventListener('focus', handleInputFocus);
                input.addEventListener('blur', handleInputBlur);
            });
        }

        // Add focus listeners for mobile zoom (always active)
        document.addEventListener('DOMContentLoaded', function() {
            // Delegate event listener for dynamically added rows
            document.addEventListener('focus', function(event) {
                const target = event.target;
                const isTableInput = target.matches('input[type="text"]') && target.closest('td') !== null;

                if (isTableInput && document.body.classList.contains('mobile-view')) {
                    handleInputFocus(event);
                }
            }, true);
        });

        function removeVoiceListeners() {
            const inputs = document.querySelectorAll('input[type="text"], textarea');
            inputs.forEach(input => {
                input.removeEventListener('focus', handleInputFocus);
                input.removeEventListener('blur', handleInputBlur);
            });
        }

        let originalInputElement = null;

        function handleInputFocus(event) {
            // Show zoom overlay in mobile view for table inputs
            if (document.body.classList.contains('mobile-view')) {
                const target = event.target;
                const isTableInput = target.closest('td') !== null;

                if (isTableInput) {
                    openZoomInput(target);
                    return;
                }
            }

            if (!isVoiceEnabled) return;
            currentFocusedElement = event.target;
            lastProcessedIndex = 0; // Reset index for new field

            try {
                recognition.start();
            } catch (e) {
                // Recognition already started
                console.log('Recognition already active');
            }
        }

        function handleInputBlur(event) {
            // Don't stop recognition on blur, keep it running for next field
        }

        function openZoomInput(inputElement) {
            originalInputElement = inputElement;
            const zoomOverlay = document.getElementById('zoomOverlay');
            const zoomInput = document.getElementById('zoomInput');
            const zoomTitle = document.getElementById('zoomTitle');

            // Get the column header name
            const td = inputElement.closest('td');
            const columnIndex = Array.from(td.parentElement.children).indexOf(td);
            const headerRow = td.closest('table').querySelector('thead tr');
            const headerCell = headerRow.children[columnIndex];
            const columnName = headerCell ? headerCell.textContent.trim() : 'Enter Text';

            // Set title and value
            zoomTitle.textContent = columnName;
            zoomInput.value = inputElement.value;

            // Show overlay
            zoomOverlay.classList.add('active');

            // Focus on zoom input
            setTimeout(() => {
                zoomInput.focus();

                // Set up voice typing for zoom input if enabled
                if (isVoiceEnabled) {
                    currentFocusedElement = zoomInput;
                    lastProcessedIndex = 0;
                    try {
                        recognition.start();
                    } catch (e) {
                        console.log('Recognition already active');
                    }
                }
            }, 100);
        }

        function closeZoomInput() {
            const zoomOverlay = document.getElementById('zoomOverlay');
            const zoomInput = document.getElementById('zoomInput');

            // Copy value back to original input
            if (originalInputElement) {
                originalInputElement.value = zoomInput.value;
            }

            // Hide overlay
            zoomOverlay.classList.remove('active');

            // Clear zoom input
            zoomInput.value = '';
            originalInputElement = null;

            // Reset voice typing reference
            if (isVoiceEnabled) {
                currentFocusedElement = null;
            }
        }

        // ===== Draft Save/Upload Functionality =====

        function saveDraft() {
            // Collect all form data
            const formData = {
                formDate: document.getElementById('formDate').value,
                formTime: document.getElementById('formTime').value,
                formPlace: document.getElementById('formPlace').value,
                baMachineNo: document.getElementById('baMachineNo').value,
                cliName: document.getElementById('cliName').value,
                otherRemarks: document.getElementById('otherRemarks').value,
                tableData: []
            };

            // Collect table data
            const rows = document.querySelectorAll('#tableBody tr');
            rows.forEach((row) => {
                const cells = row.querySelectorAll('input, textarea');
                const rowData = {
                    name: cells[0].value || '',
                    crewId: cells[1].value || '',
                    designation: cells[2].value || '',
                    id: cells[3].value || '',
                    recordNo: cells[4].value || '',
                    time: cells[5].value || '',
                    baTestResult: cells[6].value || ''
                };
                formData.tableData.push(rowData);
            });

            // Convert to JSON and download
            const dataStr = JSON.stringify(formData, null, 2);
            const dataBlob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(dataBlob);
            const link = document.createElement('a');
            link.href = url;

            // Create filename with timestamp
            const timestamp = new Date().toISOString().replace(/[:.]/g, '-').slice(0, -5);
            link.download = `BA_Test_Draft_${timestamp}.json`;

            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);

            showMessage('Draft saved successfully! File downloaded.', 'success');
        }

        function triggerUploadDraft() {
            // Trigger the hidden file input
            document.getElementById('draftFileInput').click();
        }

        function uploadDraft(event) {
            const file = event.target.files[0];
            if (!file) {
                return;
            }

            // Check if it's a JSON file
            if (!file.name.endsWith('.json')) {
                showMessage('Please upload a valid JSON draft file.', 'error');
                return;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const draftData = JSON.parse(e.target.result);

                    // Populate form fields
                    document.getElementById('formDate').value = draftData.formDate || '';
                    document.getElementById('formTime').value = draftData.formTime || '';
                    document.getElementById('formPlace').value = draftData.formPlace || '';
                    document.getElementById('baMachineNo').value = draftData.baMachineNo || '';
                    document.getElementById('cliName').value = draftData.cliName || '';
                    document.getElementById('otherRemarks').value = draftData.otherRemarks || '';

                    // Clear existing table rows
                    const tableBody = document.getElementById('tableBody');
                    tableBody.innerHTML = '';

                    // Populate table data
                    if (draftData.tableData && draftData.tableData.length > 0) {
                        draftData.tableData.forEach((rowData, index) => {
                            const newRow = document.createElement('tr');
                            newRow.innerHTML = `
                                <td class="row-number">${index + 1}</td>
                                <td><input type="text" value="${rowData.name || ''}"></td>
                                <td><input type="text" value="${rowData.crewId || ''}"></td>
                                <td><input type="text" value="${rowData.designation || ''}"></td>
                                <td><input type="text" value="${rowData.id || ''}"></td>
                                <td><input type="text" value="${rowData.recordNo || ''}"></td>
                                <td><input type="text" value="${rowData.time || ''}"></td>
                                <td><textarea rows="2">${rowData.baTestResult || ''}</textarea></td>
                            `;
                            tableBody.appendChild(newRow);
                        });
                        rowCount = draftData.tableData.length;
                    } else {
                        // If no table data, create default 10 rows
                        for (let i = 1; i <= 10; i++) {
                            const newRow = document.createElement('tr');
                            newRow.innerHTML = `
                                <td class="row-number">${i}</td>
                                <td><input type="text"></td>
                                <td><input type="text"></td>
                                <td><input type="text"></td>
                                <td><input type="text"></td>
                                <td><input type="text"></td>
                                <td><input type="text"></td>
                                <td><textarea rows="2"></textarea></td>
                            `;
                            tableBody.appendChild(newRow);
                        }
                        rowCount = 10;
                    }

                    showMessage('Draft uploaded successfully! You can now edit and submit.', 'success');
                } catch (error) {
                    console.error('Error parsing draft file:', error);
                    showMessage('Error loading draft file. Please check the file format.', 'error');
                }
            };

            reader.onerror = function() {
                showMessage('Error reading file. Please try again.', 'error');
            };

            reader.readAsText(file);

            // Reset the file input so the same file can be uploaded again
            event.target.value = '';
        }

        // Mobile View Toggle Function
        function toggleMobileView() {
            const toggle = document.getElementById('mobileToggle');
            if (toggle.checked) {
                document.body.classList.add('mobile-view');
                showMessage('Mobile view enabled! Page optimized for mobile screens.', 'success');
            } else {
                document.body.classList.remove('mobile-view');
                showMessage('Desktop view restored.', 'success');
            }
        }
    </script>
